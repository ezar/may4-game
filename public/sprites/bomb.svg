<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Thermal Detonator — cylindrical Imperial device -->
  <defs>
    <radialGradient id="bdy" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <radialGradient id="btn" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#550000"/>
    </radialGradient>
  </defs>

  <!-- Fuse wire (curling) -->
  <path d="M34,22 Q44,14 42,8 Q40,4 37,6" stroke="#998844" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Spark at fuse tip -->
  <circle cx="37" cy="6" r="5" fill="#FFD700" opacity="0.9"/>
  <circle cx="37" cy="6" r="3" fill="#fff9aa"/>
  <circle cx="37" cy="6" r="1.5" fill="#ffffff"/>
  <!-- Spark rays -->
  <line x1="37" y1="1"  x2="37" y2="-2" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="41" y1="3"  x2="44" y2="1"  stroke="#FFD700" stroke-width="1.5"/>
  <line x1="42" y1="8"  x2="46" y2="8"  stroke="#FFD700" stroke-width="1.5"/>
  <line x1="33" y1="3"  x2="30" y2="1"  stroke="#FFD700" stroke-width="1.5"/>

  <!-- Main cylindrical body -->
  <ellipse cx="32" cy="42" rx="20" ry="18" fill="url(#bdy)"/>
  <!-- Body sheen -->
  <ellipse cx="26" cy="34" rx="8" ry="5" fill="rgba(255,255,255,0.07)" transform="rotate(-20,26,34)"/>

  <!-- Imperial grip ridges (left) -->
  <rect x="11" y="34" width="5" height="2.5" fill="#1e1e2e" rx="1"/>
  <rect x="11" y="39" width="5" height="2.5" fill="#1e1e2e" rx="1"/>
  <rect x="11" y="44" width="5" height="2.5" fill="#1e1e2e" rx="1"/>
  <rect x="11" y="49" width="5" height="2.5" fill="#1e1e2e" rx="1"/>
  <!-- Grip ridges (right) -->
  <rect x="48" y="34" width="5" height="2.5" fill="#1e1e2e" rx="1"/>
  <rect x="48" y="39" width="5" height="2.5" fill="#1e1e2e" rx="1"/>
  <rect x="48" y="44" width="5" height="2.5" fill="#1e1e2e" rx="1"/>
  <rect x="48" y="49" width="5" height="2.5" fill="#1e1e2e" rx="1"/>

  <!-- Outer ring glow (red) -->
  <ellipse cx="32" cy="42" rx="20" ry="18" fill="none" stroke="#cc0000" stroke-width="2" opacity="0.7"/>
  <ellipse cx="32" cy="42" rx="20" ry="18" fill="none" stroke="#ff2244" stroke-width="1" opacity="0.4"/>

  <!-- Central activation button area -->
  <circle cx="32" cy="42" r="9" fill="#111"/>
  <circle cx="32" cy="42" r="7" fill="url(#btn)"/>
  <circle cx="32" cy="42" r="5" fill="#cc0000"/>
  <circle cx="32" cy="42" r="3" fill="#ff2222"/>
  <circle cx="32" cy="42" r="1.5" fill="#ff8888"/>

  <!-- Imperial symbol embossed rings -->
  <circle cx="32" cy="42" r="12" fill="none" stroke="#1a1a2a" stroke-width="1.5"/>
  <circle cx="32" cy="42" r="16" fill="none" stroke="#141420" stroke-width="1"/>
</svg>
