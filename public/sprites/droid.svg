<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- B1 Battle Droid — tan chassis, skull-like elongated head -->

  <!-- Legs -->
  <rect x="26" y="52" width="5" height="11" fill="#c4a46a" rx="1"/>
  <rect x="33" y="52" width="5" height="11" fill="#c4a46a" rx="1"/>
  <rect x="25" y="61" width="7" height="3" fill="#b09050" rx="1"/>
  <rect x="32" y="61" width="7" height="3" fill="#b09050" rx="1"/>

  <!-- Pelvis -->
  <rect x="22" y="46" width="20" height="8" fill="#c8a870" rx="2"/>

  <!-- Torso / backpack unit -->
  <rect x="24" y="28" width="16" height="20" fill="#c8a870" rx="2"/>
  <!-- Backpack box -->
  <rect x="20" y="30" width="8" height="14" fill="#b89558" rx="2"/>
  <rect x="21" y="32" width="6" height="3" fill="#a08040" rx="1"/>
  <rect x="21" y="37" width="6" height="3" fill="#a08040" rx="1"/>

  <!-- Arms -->
  <rect x="40" y="30" width="6" height="3" fill="#c4a46a" rx="1"/>
  <rect x="44" y="30" width="3" height="10" fill="#c4a46a" rx="1"/>
  <!-- Blaster -->
  <rect x="45" y="38" width="9" height="2.5" fill="#888" rx="1"/>
  <rect x="53" y="37" width="2" height="4.5" fill="#777" rx="0.5"/>

  <!-- Chest detail -->
  <rect x="26" y="31" width="12" height="4" fill="#b89050" rx="1"/>
  <rect x="28" y="37" width="8" height="3" fill="#b89050" rx="1"/>
  <rect x="28" y="42" width="8" height="2" fill="#a07840" rx="1"/>

  <!-- Neck — thin connector -->
  <rect x="30" y="22" width="4" height="7" fill="#c4a46a"/>

  <!-- Head — elongated skull shape, wider top -->
  <ellipse cx="32" cy="14" rx="11" ry="14" fill="#caa870"/>
  <ellipse cx="32" cy="10" rx="10" ry="11" fill="#d4b478"/>

  <!-- Skull indentations at temples -->
  <ellipse cx="22" cy="12" rx="3" ry="5" fill="#b89050"/>
  <ellipse cx="42" cy="12" rx="3" ry="5" fill="#b89050"/>

  <!-- Photoreceptor eye strip -->
  <rect x="22" y="12" width="20" height="7" fill="#111" rx="2"/>
  <!-- Left eye glow -->
  <ellipse cx="27" cy="15.5" rx="3.5" ry="3" fill="#cc2200"/>
  <ellipse cx="27" cy="15.5" rx="2" ry="1.8" fill="#ff4400"/>
  <ellipse cx="27" cy="15" rx="0.8" ry="0.7" fill="#ff8866"/>
  <!-- Right eye glow -->
  <ellipse cx="37" cy="15.5" rx="3.5" ry="3" fill="#cc2200"/>
  <ellipse cx="37" cy="15.5" rx="2" ry="1.8" fill="#ff4400"/>
  <ellipse cx="37" cy="15" rx="0.8" ry="0.7" fill="#ff8866"/>

  <!-- Communication antenna -->
  <rect x="40" y="5" width="2" height="8" fill="#a08040" rx="0.5"/>
  <circle cx="41" cy="4" r="2" fill="#cc8800"/>

  <!-- Chin / jaw area -->
  <rect x="26" y="22" width="12" height="4" fill="#b89050" rx="1"/>
  <rect x="28" y="23" width="8" height="2" fill="#a07840" rx="0.5"/>
</svg>
