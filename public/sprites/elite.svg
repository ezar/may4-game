<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Death Trooper — all-black armour, glowing red visor -->

  <!-- Cape / robe body -->
  <rect x="14" y="40" width="36" height="24" fill="#0a0a12" rx="4"/>
  <!-- Robe fold lines -->
  <rect x="20" y="42" width="2" height="20" fill="#12121e" rx="1"/>
  <rect x="28" y="42" width="2" height="20" fill="#12121e" rx="1"/>
  <rect x="36" y="42" width="2" height="20" fill="#12121e" rx="1"/>
  <rect x="44" y="42" width="2" height="20" fill="#12121e" rx="1"/>

  <!-- Chest armour plate -->
  <rect x="16" y="36" width="32" height="10" fill="#0e0e1a" rx="3"/>
  <!-- Chest ribbing -->
  <rect x="17" y="39" width="30" height="1.5" fill="#1a1a28"/>
  <rect x="17" y="42" width="30" height="1.5" fill="#1a1a28"/>
  <!-- Centre chest detail -->
  <rect x="28" y="37" width="8" height="8" fill="#0a0a14" rx="1"/>
  <rect x="29" y="38" width="6" height="6" fill="#111120" rx="1"/>
  <!-- Chest indicator light -->
  <circle cx="32" cy="41" r="1.5" fill="#ff0000" opacity="0.8"/>

  <!-- Pauldrons (shoulder armour) -->
  <ellipse cx="13" cy="37" rx="7" ry="6" fill="#0c0c18" stroke="#1a1a2a" stroke-width="1"/>
  <ellipse cx="51" cy="37" rx="7" ry="6" fill="#0c0c18" stroke="#1a1a2a" stroke-width="1"/>

  <!-- Neck -->
  <rect x="28" y="30" width="8" height="7" fill="#0a0a12"/>
  <rect x="29" y="31" width="6" height="5" fill="#111118" rx="1"/>

  <!-- Helmet — angular Death Trooper shape -->
  <!-- Main dome (angular, not round) -->
  <path d="M18,30 L20,12 L32,6 L44,12 L46,30 L42,36 L22,36 Z" fill="#0c0c1a"/>
  <!-- Dome highlight -->
  <path d="M22,13 L32,8 L42,13 L40,10 L32,6 Z" fill="#14141e" opacity="0.6"/>

  <!-- Side-cheek armour indents -->
  <rect x="18" y="22" width="5" height="10" fill="#080810" rx="1"/>
  <rect x="41" y="22" width="5" height="10" fill="#080810" rx="1"/>

  <!-- Visor strip — elongated red glow -->
  <rect x="19" y="18" width="26" height="10" fill="#1a0000" rx="2"/>
  <rect x="20" y="19" width="24" height="8" fill="#220000" rx="1.5"/>
  <!-- Glowing red visor slit -->
  <rect x="20" y="20" width="24" height="6" fill="#550000" rx="1"/>
  <rect x="20" y="21" width="24" height="4" fill="#880000" rx="1"/>
  <!-- Eye glow hot spots -->
  <ellipse cx="27" cy="23" rx="4.5" ry="2.5" fill="#cc0000"/>
  <ellipse cx="27" cy="23" rx="3" ry="1.5" fill="#ff2200"/>
  <ellipse cx="27" cy="23" rx="1.2" ry="0.8" fill="#ff6644"/>
  <ellipse cx="37" cy="23" rx="4.5" ry="2.5" fill="#cc0000"/>
  <ellipse cx="37" cy="23" rx="3" ry="1.5" fill="#ff2200"/>
  <ellipse cx="37" cy="23" rx="1.2" ry="0.8" fill="#ff6644"/>

  <!-- Helmet chin/rebreather piece -->
  <rect x="22" y="30" width="20" height="6" fill="#0a0a14" rx="2"/>
  <rect x="24" y="31" width="5" height="4" fill="#111" rx="1"/>
  <rect x="30" y="31" width="4" height="4" fill="#111" rx="1"/>
  <rect x="35" y="31" width="5" height="4" fill="#111" rx="1"/>

  <!-- Imperial Death Trooper blaster (SE-14r) -->
  <rect x="46" y="43" width="16" height="4" fill="#1a1a28" rx="1"/>
  <rect x="48" y="41" width="12" height="2.5" fill="#111" rx="0.5"/>
  <rect x="60" y="42" width="3" height="7" fill="#111" rx="0.5"/>
</svg>
