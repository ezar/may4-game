<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0d0d2e"/>
      <stop offset="100%" stop-color="#03030f"/>
    </radialGradient>
    <radialGradient id="bladeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#00BFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00BFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-20%" width="300%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="72" cy="88" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="420" cy="64" r="2" fill="white" opacity="0.5"/>
  <circle cx="460" cy="200" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="48" cy="320" r="2" fill="white" opacity="0.4"/>
  <circle cx="390" cy="380" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="110" cy="450" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="330" cy="130" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="180" cy="70" r="2" fill="white" opacity="0.55"/>
  <circle cx="470" cy="440" r="2" fill="white" opacity="0.5"/>

  <!-- Blade outer glow -->
  <rect x="238" y="52" width="36" height="300" rx="18" fill="#00BFFF" opacity="0.18" filter="url(#glow)"/>

  <!-- Blade mid glow -->
  <rect x="246" y="52" width="20" height="300" rx="10" fill="#00BFFF" opacity="0.55" filter="url(#softGlow)"/>

  <!-- Blade core (white) -->
  <rect x="251" y="52" width="10" height="300" rx="5" fill="white" filter="url(#softGlow)"/>

  <!-- Blade tip glow cap -->
  <ellipse cx="256" cy="52" rx="12" ry="12" fill="white" opacity="0.9" filter="url(#softGlow)"/>

  <!-- Crossguard -->
  <rect x="212" y="352" width="88" height="10" rx="5" fill="#7a7a8c"/>
  <rect x="208" y="348" width="14" height="18" rx="4" fill="#999aaa"/>
  <rect x="290" y="348" width="14" height="18" rx="4" fill="#999aaa"/>

  <!-- Handle body -->
  <rect x="242" y="360" width="28" height="90" rx="6" fill="#6a6a7a"/>
  <!-- Handle ridge detail -->
  <rect x="240" y="370" width="32" height="6" rx="3" fill="#55556a"/>
  <rect x="240" y="384" width="32" height="6" rx="3" fill="#55556a"/>
  <rect x="240" y="398" width="32" height="6" rx="3" fill="#55556a"/>
  <rect x="240" y="412" width="32" height="6" rx="3" fill="#55556a"/>
  <!-- Handle grip accent -->
  <rect x="242" y="360" width="7" height="90" rx="3" fill="#8888a0"/>
  <!-- Pommel -->
  <rect x="242" y="448" width="28" height="14" rx="7" fill="#55556a"/>

  <!-- May the 4th text -->
  <text x="256" y="500" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#FFD700" text-anchor="middle" font-weight="bold" letter-spacing="2" opacity="0.85">MAY THE 4TH</text>
</svg>
