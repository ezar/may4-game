<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="ic"><rect width="512" height="512" rx="90" ry="90"/></clipPath>
    <filter id="bg" x="-80%" y="-20%" width="260%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="rg" x="-80%" y="-20%" width="260%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="xg" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="sg" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <g clip-path="url(#ic)">
    <!-- Space background -->
    <rect width="512" height="512" fill="#03030f"/>

    <!-- Stars -->
    <circle cx="55"  cy="42"  r="1.2" fill="white" opacity="0.9"/>
    <circle cx="108" cy="78"  r="0.8" fill="white" opacity="0.65"/>
    <circle cx="180" cy="35"  r="1.4" fill="white" opacity="0.85"/>
    <circle cx="250" cy="58"  r="0.9" fill="white" opacity="0.6"/>
    <circle cx="332" cy="40"  r="1.1" fill="white" opacity="0.8"/>
    <circle cx="418" cy="52"  r="0.8" fill="white" opacity="0.7"/>
    <circle cx="462" cy="88"  r="1.3" fill="white" opacity="0.9"/>
    <circle cx="72"  cy="128" r="0.7" fill="white" opacity="0.55"/>
    <circle cx="142" cy="155" r="1.0" fill="white" opacity="0.75"/>
    <circle cx="392" cy="132" r="0.8" fill="white" opacity="0.65"/>
    <circle cx="472" cy="162" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="44"  cy="198" r="0.9" fill="white" opacity="0.7"/>
    <circle cx="491" cy="224" r="1.0" fill="white" opacity="0.75"/>
    <circle cx="78"  cy="368" r="1.1" fill="white" opacity="0.8"/>
    <circle cx="432" cy="382" r="0.8" fill="white" opacity="0.65"/>
    <circle cx="58"  cy="452" r="1.3" fill="white" opacity="0.85"/>
    <circle cx="462" cy="464" r="0.9" fill="white" opacity="0.7"/>
    <circle cx="128" cy="482" r="0.7" fill="white" opacity="0.55"/>
    <circle cx="382" cy="492" r="1.0" fill="white" opacity="0.75"/>
    <circle cx="205" cy="498" r="0.8" fill="white" opacity="0.6"/>
    <circle cx="292" cy="45"  r="0.6" fill="white" opacity="0.5"/>
    <circle cx="488" cy="310" r="0.9" fill="white" opacity="0.65"/>
    <circle cx="22"  cy="310" r="0.8" fill="white" opacity="0.6"/>

    <!-- === Blue saber (Jedi) === -->
    <!-- Glow aura behind -->
    <line x1="135" y1="72" x2="382" y2="458"
          stroke="#00BFFF" stroke-width="26" stroke-linecap="round"
          opacity="0.22" filter="url(#bg)"/>
    <!-- Blade glow -->
    <line x1="135" y1="72" x2="333" y2="381"
          stroke="#00BFFF" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
    <!-- Blade core -->
    <line x1="135" y1="72" x2="333" y2="381"
          stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Handle -->
    <line x1="333" y1="381" x2="382" y2="458"
          stroke="#666" stroke-width="17" stroke-linecap="round"/>
    <line x1="333" y1="381" x2="382" y2="458"
          stroke="#888" stroke-width="13" stroke-linecap="round"/>
    <!-- Guard crossbar -->
    <line x1="321" y1="389" x2="345" y2="373"
          stroke="#bbb" stroke-width="8" stroke-linecap="round"/>
    <!-- Handle grip rings -->
    <line x1="345" y1="401" x2="367" y2="426"
          stroke="#444" stroke-width="3.5" stroke-linecap="butt"/>
    <line x1="352" y1="413" x2="374" y2="438"
          stroke="#444" stroke-width="3.5" stroke-linecap="butt"/>
    <line x1="360" y1="425" x2="380" y2="450"
          stroke="#444" stroke-width="3.5" stroke-linecap="butt"/>

    <!-- === Red saber (Sith) === -->
    <!-- Glow aura behind -->
    <line x1="377" y1="72" x2="130" y2="458"
          stroke="#FF1744" stroke-width="26" stroke-linecap="round"
          opacity="0.22" filter="url(#rg)"/>
    <!-- Blade glow -->
    <line x1="377" y1="72" x2="179" y2="381"
          stroke="#FF1744" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
    <!-- Blade core -->
    <line x1="377" y1="72" x2="179" y2="381"
          stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Handle -->
    <line x1="179" y1="381" x2="130" y2="458"
          stroke="#666" stroke-width="17" stroke-linecap="round"/>
    <line x1="179" y1="381" x2="130" y2="458"
          stroke="#888" stroke-width="13" stroke-linecap="round"/>
    <!-- Guard crossbar -->
    <line x1="167" y1="389" x2="191" y2="373"
          stroke="#bbb" stroke-width="8" stroke-linecap="round"/>
    <!-- Handle grip rings -->
    <line x1="167" y1="401" x2="145" y2="426"
          stroke="#444" stroke-width="3.5" stroke-linecap="butt"/>
    <line x1="160" y1="413" x2="138" y2="438"
          stroke="#444" stroke-width="3.5" stroke-linecap="butt"/>
    <line x1="152" y1="425" x2="132" y2="450"
          stroke="#444" stroke-width="3.5" stroke-linecap="butt"/>

    <!-- === Crossing flash at (256, 259) === -->
    <!-- Wide bloom -->
    <circle cx="256" cy="259" r="35" fill="white" opacity="0.95" filter="url(#xg)"/>
    <!-- Bright core -->
    <circle cx="256" cy="259" r="11" fill="white"/>
    <circle cx="256" cy="259" r="6"  fill="#FFE566"/>

    <!-- Spark lines -->
    <line x1="256" y1="259" x2="202" y2="198" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="256" y1="259" x2="312" y2="194" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="256" y1="259" x2="185" y2="244" stroke="#FF9800" stroke-width="2"   stroke-linecap="round" opacity="0.8"/>
    <line x1="256" y1="259" x2="328" y2="248" stroke="#FF9800" stroke-width="2"   stroke-linecap="round" opacity="0.8"/>
    <line x1="256" y1="259" x2="236" y2="188" stroke="white"   stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="256" y1="259" x2="280" y2="184" stroke="white"   stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="256" y1="259" x2="216" y2="292" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="256" y1="259" x2="298" y2="298" stroke="#FF9800" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="256" y1="259" x2="192" y2="272" stroke="white"   stroke-width="1"   stroke-linecap="round" opacity="0.45"/>
    <line x1="256" y1="259" x2="322" y2="276" stroke="white"   stroke-width="1"   stroke-linecap="round" opacity="0.45"/>

    <!-- Spark dots at line tips -->
    <circle cx="200" cy="196" r="3.5" fill="#FFD700" filter="url(#sg)"/>
    <circle cx="314" cy="192" r="3"   fill="#FFD700" filter="url(#sg)"/>
    <circle cx="182" cy="242" r="2.5" fill="#FF9800" filter="url(#sg)"/>
    <circle cx="330" cy="246" r="2.5" fill="#FF9800" filter="url(#sg)"/>
    <circle cx="234" cy="186" r="2"   fill="white"   opacity="0.9"/>
    <circle cx="282" cy="182" r="2"   fill="white"   opacity="0.9"/>
    <circle cx="214" cy="294" r="2"   fill="#FFD700" opacity="0.75"/>
    <circle cx="300" cy="300" r="2"   fill="#FFD700" opacity="0.75"/>
  </g>
</svg>
